<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheDJSlett | Official EPK</title>
    <meta name="description" content="TheDJSlett - Hardstyle DJ & Producer from Medellín.">
    <link rel="icon" href="logo.webp" type="image/webp">
    <style>
        :root {
            --neon-lime: #32ff00;
            --dark-bg: #050505;
            --card-bg: #111111;
            --text-gray: #cccccc;
            --terminal-green: #1aed02;
            --input-bg: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--dark-bg);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero { 
            padding: 80px 20px; 
            border-bottom: 2px solid #111;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        .hero img {
            width: 160px;
            height: 160px;
            filter: drop-shadow(0 0 20px var(--neon-lime));
            border-radius: 50%;
            border: 2px solid var(--neon-lime);
            object-fit: cover;
        }
        
        .hero h1 { font-size: 3.5rem; margin: 15px 0 5px 0; text-transform: uppercase; letter-spacing: 4px; }
        .hero p { color: var(--neon-lime); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 25px; }

        .btn-booking {
            display: inline-block;
            background: var(--neon-lime);
            color: black;
            padding: 14px 35px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            margin: 10px 0 20px 0;
            transition: 0.3s;
            letter-spacing: 1px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }
        .btn-booking:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-lime); }

        .social-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .social-links a {
            color: var(--neon-lime);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid var(--neon-lime);
            padding: 8px 15px;
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
        }
        .social-links a:hover { background: var(--neon-lime); color: black; }

        nav {
            background: rgba(0,0,0,0.95);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(15px);
            flex-wrap: wrap;
        }
        nav button {
            margin: 5px;
            background: transparent;
            color: #888;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        nav button.active-btn { color: var(--neon-lime); border-bottom: 2px solid var(--neon-lime); }

        .tab { display: none; padding: 50px 20px; max-width: 900px; margin: 0 auto; animation: slideUp 0.5s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #222;
            text-align: left;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .card h2 { color: var(--neon-lime); text-transform: uppercase; border-left: 4px solid var(--neon-lime); padding-left: 15px; margin-bottom: 25px; }

        footer { padding: 60px 40px; color: #333; font-size: 0.75rem; border-top: 1px solid #111; }

        /* Estilo para el formulario de Formspree */
        .contact-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.8rem; text-transform: uppercase; color: var(--neon-lime); font-weight: bold; }
        .form-group input, .form-group textarea {
            background: var(--input-bg);
            border: 1px solid #333;
            padding: 15px;
            color: white;
            border-radius: 5px;
            font-family: inherit;
        }
        .btn-send {
            background: var(--neon-lime);
            color: black;
            border: none;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="hero">
    <img src="logo.webp" alt="TheDJSlett Logo"> 
    <h1>TheDJSlett</h1>
    <p>HARDSTYLE DJ / PRODUCER</p>
    <button onclick="document.querySelector('[data-tab=contact]').click()" class="btn-booking">INICIAR BOOKING</button>
    <div class="social-links">
        <a href="https://open.spotify.com/artist/4X9Zf119U8GscfJ85Xf4yz" target="_blank">Spotify</a>
        <a href="https://www.instagram.com/thedjslett" target="_blank">Instagram</a>
        <a href="https://youtube.com/@thedjslett" target="_blank">YouTube</a>
    </div>
</div>

<nav id="navbar">
    <button data-tab="home" class="active-btn">Inicio</button>
    <button data-tab="music">Música</button>
    <button data-tab="contact">Contacto</button>
</nav>

<div id="home" class="tab active">
    <div class="card">
        <h2>Bienvenido</h2>
        <p style="color: var(--text-gray);">Explora mi discografía y solicita información para eventos.</p>
    </div>
</div>

<div id="music" class="tab">
    <div class="card">
        <h2>Discografía Oficial</h2>
        <iframe 
            style="border-radius:12px" 
            src="https://open.spotify.com/embed/artist/4X9Zf119U8GscfJ85Xf4yz?utm_source=generator&theme=0" 
            width="100%" 
            height="352" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>
</div>

<div id="contact" class="tab">
    <div class="card">
        <h2>Booking & Inquiry</h2>
        <form class="contact-form" action="https://formspree.io/f/TU_ID_DE_FORMSPREE" method="POST">
            <div class="form-group">
                <label>Nombre / Promotora</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Mensaje</label>
                <textarea name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-send">ENVIAR SOLICITUD</button>
        </form>
    </div>
</div>

<footer>
    © 2026 TheDJSlett. Medellín, CO.
</footer>

<script>
    const buttons = document.querySelectorAll("nav button");
    const tabs = document.querySelectorAll(".tab");

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            const target = btn.getAttribute("data-tab");
            tabs.forEach(t => t.classList.remove("active"));
            buttons.forEach(b => b.classList.remove("active-btn"));
            document.getElementById(target).classList.add("active");
            btn.classList.add("active-btn");
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    });
</script>

</body>
</html>
